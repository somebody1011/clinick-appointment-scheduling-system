<VirtualHost *:80>
    ServerAdmin admin@clinic.local
    ServerName clinic.local
    ServerAlias www.clinic.local
    
    DocumentRoot /var/www/html
    
    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    # Enable mod_rewrite
    <IfModule mod_rewrite.c>
        RewriteEngine On
        # Do not rewrite existing files or directories
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        # Do not rewrite direct requests for PHP files (like login.php)
        RewriteCond %{REQUEST_URI} !\.(php|css|js|png|jpg|jpeg|gif|ico)$ [NC]
        # Explicitly exclude login page from being rewritten
        RewriteCond %{REQUEST_URI} !^/login.php$ [NC]
        RewriteRule ^(.*)$ index.php?url=$1 [QSA,L]
    </IfModule>
    
    # Logging
    ErrorLog ${APACHE_LOG_DIR}/clinic_error.log
    CustomLog ${APACHE_LOG_DIR}/clinic_access.log combined
</VirtualHost>
